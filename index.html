<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Dịch Thuật Song Phương Thông Minh</title>
    <style>
        /* --- Reset & Thiết lập chung --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        
        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* --- Container chính --- */
        .translator-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 900px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }


        h3 {
            text-align: center;
            margin-bottom: 25px;
            color: blue;
            font-size: 12px;
        }

        /* --- Bố cục các hộp văn bản --- */
        .boxes-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            align-items: stretch;
        }

        .box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .box-header {
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 30px;
        }

        .language-badge {
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .badge-en { background-color: #3498db; }
        .badge-vi { background-color: #e74c3c; }

        /* Nút Micro */
        .btn-mic {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .btn-mic:hover {
            background-color: #f0f0f0;
        }

        .btn-mic.recording {
            animation: pulse 1.2s infinite;
            background-color: #ffcccc;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: #3498db;
        }

        #output-text {
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        /* --- Nút bấm Đảo chiều Ngôn ngữ (Swap) --- */
        .swap-zone {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-swap {
            background-color: #ffffff;
            border: 2px solid #34495e;
            color: #34495e;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-swap:hover {
            background-color: #34495e;
            color: #fff;
            transform: rotate(180deg);
        }

        /* --- Tùy chọn Tự động phát âm --- */
        .auto-speak-container {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-weight: normal;
            color: #7f8c8d;
            cursor: pointer;
            user-select: none;
        }

        .auto-speak-container input {
            cursor: pointer;
        }

        /* --- Nút bấm điều khiển --- */
        .button-zone {
            display: flex;
            justify-content: center;
        }

        .btn-translate {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }

        .btn-translate:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* --- Responsive cho điện thoại --- */
        @media (max-width: 768px) {
            .boxes-wrapper {
                flex-direction: column;
            }
            .swap-zone {
                margin: 5px 0;
            }
            .btn-swap {
                transform: rotate(90deg);
            }
            .btn-swap:hover {
                transform: rotate(270deg);
            }
            textarea {
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="translator-container">
        <h1>Ứng Dụng Dịch Thuật Song Phương</h1>
        <h3>_My translate API_3a</h3>
        
        <div class="boxes-wrapper">
            <div class="box">
                <div class="box-header">
                    <span id="label-source">Tiếng Anh</span> 
                    <span id="badge-source" class="language-badge badge-en">EN</span>
                    <button id="btn-mic" class="btn-mic" onclick="toggleSpeechRecognition()" title="Nói">🎤</button>
                </div>
                <textarea id="input-text" placeholder="Nhập văn bản hoặc bấm Micro để nói..."></textarea>
            </div>
            
            <div class="swap-zone">
                <button class="btn-swap" onclick="swapLanguages()" title="Đổi chiều dịch thuật">⇄</button>
            </div>
            
            <div class="box">
                <div class="box-header">
                    <span id="label-target">Tiếng Việt</span> 
                    <span id="badge-target" class="language-badge badge-vi">VI</span>
                    
                    <label class="auto-speak-container">
                        <input type="checkbox" id="auto-speak-cb" checked>
                        <span>Dịch xong đọc luôn 🔊</span>
                    </label>
                </div>
                <textarea id="output-text" placeholder="Bản dịch sẽ xuất hiện ở đây..." readonly></textarea>
            </div>
        </div>

        <div class="button-zone">
            <button class="btn-translate" onclick="translateText()">Dịch Ngay</button>
        </div>
    </div>

    <script>
        // Cấu hình URL Google Apps Script của bạn tại đây
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKO9ySTedNJqJ-uv9MFNtGFC8DPtf3jPP4pV0pL0zIAng661rZ70_YcgUeAmOpdiEI/exec";
         
        // Biến toàn cục lưu hướng dịch hiện tại: mặc định 'en-vi' (Anh sang Việt)
        let currentLangPair = 'en-vi'; 
        
        let recognition;
        let isRecording = false;

        // 1. KHỞI TẠO TÍNH NĂNG NHẬN DIỆN GIỌNG NÓI (SPEECH RECOGNITION)
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = false; 
            recognition.interimResults = false; 

            recognition.onresult = function(event) {
                const resultText = event.results[0][0].transcript;
                document.getElementById('input-text').value = resultText;
                stopRecordingStyle();
            };

            recognition.onerror = function(event) {
                console.error("Lỗi nhận diện:", event.error);
                stopRecordingStyle();
                if(event.error === 'not-allowed') {
                    alert("Bạn cần cấp quyền truy cập Micro cho trang web!");
                }
            };

            recognition.onend = function() {
                stopRecordingStyle();
            };
        } else {
            document.getElementById('btn-mic').style.display = 'none';
        }

        // Hàm điều khiển bật tắt Micro (Tự động nhận cấu hình theo hướng dịch hiện tại)
        function toggleSpeechRecognition() {
            if (!recognition) return;

            if (isRecording) {
                recognition.stop();
                stopRecordingStyle();
            } else {
                document.getElementById('input-text').value = "";
                
                // Cấu hình mã ngôn ngữ cho Micro dựa theo chiều dịch hiện tại
                // Nếu 'en-vi' thì Micro nghe tiếng Anh ('en-US'), nếu 'vi-en' thì nghe tiếng Việt ('vi-VN')
                if (currentLangPair === 'en-vi') {
                    recognition.lang = 'en-US';
                    document.getElementById('input-text').placeholder = "Đang nghe... Hãy nói TIẾNG ANH!";
                } else {
                    recognition.lang = 'vi-VN';
                    document.getElementById('input-text').placeholder = "Đang nghe... Hãy nói TIẾNG VIỆT!";
                }
                
                const micBtn = document.getElementById('btn-mic');
                micBtn.classList.add('recording');
                micBtn.innerText = "🛑";
                isRecording = true;

                recognition.start();
            }
        }

        function stopRecordingStyle() {
            const micBtn = document.getElementById('btn-mic');
            micBtn.classList.remove('recording');
            micBtn.innerText = "🎤";
            document.getElementById('input-text').placeholder = "Nhập văn bản hoặc bấm Micro để nói...";
            isRecording = false;
        }

        // 2. HÀM ĐỔI CHIỀU NGÔN NGỮ ĐỘNG (SWAP)
        function swapLanguages() {
            // Dừng mọi tiến trình đọc/nói đang chạy dở
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            if (isRecording) recognition.stop();

            // Đổi trạng thái biến hướng dịch
            currentLangPair = (currentLangPair === 'en-vi') ? 'vi-en' : 'en-vi';

            // Lấy các phần tử DOM giao diện cần đổi
            const labelSrc = document.getElementById('label-source');
            const labelTgt = document.getElementById('label-target');
            const badgeSrc = document.getElementById('badge-source');
            const badgeTgt = document.getElementById('badge-target');
            const inputTxt = document.getElementById('input-text');
            const outputTxt = document.getElementById('output-text');

            // Hoán đổi nội dung Text hiện tại của 2 ô (nếu có) để người dùng không phải nhập lại
            const tempText = inputTxt.value;
            inputTxt.value = outputTxt.value;
            outputTxt.value = tempText;

            // Cập nhật lại giao diện chữ hiển thị và màu sắc Badge
            if (currentLangPair === 'en-vi') {
                labelSrc.innerText = "Tiếng Anh";
                badgeSrc.innerText = "EN";
                badgeSrc.className = "language-badge badge-en";

                labelTgt.innerText = "Tiếng Việt";
                badgeTgt.innerText = "VI";
                badgeTgt.className = "language-badge badge-vi";
            } else {
                labelSrc.innerText = "Tiếng Việt";
                badgeSrc.innerText = "VI";
                badgeSrc.className = "language-badge badge-vi";

                labelTgt.innerText = "Tiếng Anh";
                badgeTgt.innerText = "EN";
                badgeTgt.className = "language-badge badge-en";
            }
        }

        // 3. HÀM DỊCH VĂN BẢN (GỬI ĐÚNG THAM SỐ LANG ĐẾN GOOGLE APPS SCRIPT)
        async function translateText() {
            const inputText = document.getElementById('input-text').value.trim();
            const outputText = document.getElementById('output-text');

            if (!inputText) {
                outputText.value = "Vui lòng nhập đoạn văn cần dịch.";
                return;
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            outputText.value = "Đang dịch...";

            try {
                // Truyền trực tiếp tham số currentLangPair ('en-vi' hoặc 'vi-en') vào API URL
                const finalUrl = `${GOOGLE_SCRIPT_URL}?q=${encodeURIComponent(inputText)}&lang=${currentLangPair}`;
                const response = await fetch(finalUrl);
                const data = await response.json();

                if (data.status === "success") {
                    outputText.value = data.translated_text;
                    
                    const isAutoSpeak = document.getElementById('auto-speak-cb').checked;
                    if (isAutoSpeak) {
                        speak(data.translated_text);
                    }
                } else {
                    outputText.value = "Lỗi từ API: " + data.message;
                }
            } catch (error) {
                console.error("Lỗi:", error);
                outputText.value = "Không thể kết nối với máy chủ dịch thuật.";
            }
        }

        // 4. HÀM PHÁT ÂM THÔNG MINH (TỰ ĐỘNG CHỌN GIỌNG THEO NGÔN NGỮ ĐÍCH)
        function speak(text) {
            if ('speechSynthesis' in window && text) {
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0; 
                utterance.pitch = 1.0;

                const voices = window.speechSynthesis.getVoices();
                
                // Xác định ngôn ngữ đích cần đọc dựa vào currentLangPair
                // Nếu dịch sang 'vi-en' -> Đích là tiếng Anh ('en'). Ngược lại -> Đích là tiếng Việt ('vi')
                const targetLangCode = (currentLangPair === 'vi-en') ? 'en' : 'vi';
                const matchedVoice = voices.find(voice => voice.lang.toLowerCase().includes(targetLangCode));

                if (matchedVoice) {
                    utterance.voice = matchedVoice;
                    utterance.lang = matchedVoice.lang;
                } else {
                    utterance.lang = (targetLangCode === 'en') ? 'en-US' : 'vi-VN';
                }

                window.speechSynthesis.speak(utterance);
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
    </script>

</body>
</html>
