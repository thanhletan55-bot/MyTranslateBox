<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Dịch Thuật Thông Minh</title>
    <style>
        /* --- Reset & Thiết lập chung --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* --- Container chính --- */
        .translator-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 800px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }

        /* --- Bố cục các hộp văn bản --- */
        .boxes-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .box-header {
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .language-badge {
            background-color: #3498db;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Nút Micro */
        .btn-mic {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .btn-mic:hover {
            background-color: #f0f0f0;
        }

        /* Hiệu ứng nhấp nháy đỏ khi đang ghi âm */
        .btn-mic.recording {
            animation: pulse 1.2s infinite;
            background-color: #ffcccc;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: #3498db;
        }

        #output-text {
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        /* --- Tùy chọn Tự động phát âm --- */
        .auto-speak-container {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-weight: normal;
            color: #7f8c8d;
            cursor: pointer;
            user-select: none;
        }

        .auto-speak-container input {
            cursor: pointer;
        }

        /* --- Nút bấm điều khiển --- */
        .button-zone {
            display: flex;
            justify-content: center;
        }

        .btn-translate {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }

        .btn-translate:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* --- Responsive cho điện thoại --- */
        @media (max-width: 600px) {
            .boxes-wrapper {
                flex-direction: column;
            }
            textarea {
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="translator-container">
        <h1>Ứng Dụng Dịch Thuật Thông Minh</h1>
        
        <div class="boxes-wrapper">
            <div class="box">
                <div class="box-header">
                    Tiếng Anh <span class="language-badge">EN</span>
                    <button id="btn-mic" class="btn-mic" onclick="toggleSpeechRecognition()" title="Nói tiếng Anh">🎤</button>
                </div>
                <textarea id="input-text" placeholder="Nhập văn bản hoặc bấm Micro để nói tiếng Anh..."></textarea>
            </div>
            
            <div class="box">
                <div class="box-header">
                    Tiếng Việt <span class="language-badge" style="background-color: #e74c3c;">VI</span>
                    
                    <label class="auto-speak-container">
                        <input type="checkbox" id="auto-speak-cb" checked>
                        <span>Dịch xong đọc luôn 🔊</span>
                    </label>
                </div>
                <textarea id="output-text" placeholder="Bản dịch sẽ xuất hiện ở đây..." readonly></textarea>
            </div>
        </div>

        <div class="button-zone">
            <button class="btn-translate" onclick="translateText()">Dịch Ngay</button>
        </div>
    </div>

    <script>
        // Cấu hình URL Google Apps Script của bạn tại đây
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKO9ySTedNJqJ-uv9MFNtGFC8DPtf3jPP4pV0pL0zIAng661rZ70_YcgUeAmOpdiEI/exec";
        
        let recognition;
        let isRecording = false;

        // 1. KHỞI TẠO TÍNH NĂNG NHẬN DIỆN GIỌNG NÓI (SPEECH RECOGNITION)
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = false; // Chỉ nghe một câu ngắn rồi dừng
            recognition.interimResults = false; // Không lấy kết quả tạm thời
            recognition.lang = 'en-US'; // Đặt ngôn ngữ nhận diện là TIẾNG ANH

            // Khi nhận diện thành công và trả về văn bản
            recognition.onresult = function(event) {
                const resultText = event.results[0][0].transcript;
                document.getElementById('input-text').value = resultText;
                stopRecordingStyle();
            };

            // Khi có lỗi xảy ra (ví dụ: không nói gì, chặn quyền mic)
            recognition.onerror = function(event) {
                console.error("Lỗi nhận diện:", event.error);
                stopRecordingStyle();
                if(event.error === 'not-allowed') {
                    alert("Bạn cần cấp quyền truy cập Micro cho trang web!");
                }
            };

            // Khi quá trình ghi âm kết thúc tự động
            recognition.onend = function() {
                stopRecordingStyle();
            };
        } else {
            // Nếu trình duyệt không hỗ trợ (ví dụ một số bản Firefox cũ)
            document.getElementById('btn-mic').style.display = 'none';
            console.log("Trình duyệt không hỗ trợ nhận diện giọng nói.");
        }

        // Hàm bật/tắt ghi âm khi bấm nút Micro
        function toggleSpeechRecognition() {
            if (!recognition) return;

            if (isRecording) {
                recognition.stop();
                stopRecordingStyle();
            } else {
                // Xóa chữ cũ trong ô nhập liệu trước khi nói
                document.getElementById('input-text').value = "";
                document.getElementById('input-text').placeholder = "Đang lắng nghe... Hãy nói tiếng Anh!";
                
                // Đổi trạng thái giao diện nút bấm
                const micBtn = document.getElementById('btn-mic');
                micBtn.classList.add('recording');
                micBtn.innerText = "🛑";
                isRecording = true;

                recognition.start();
            }
        }

        function stopRecordingStyle() {
            const micBtn = document.getElementById('btn-mic');
            micBtn.classList.remove('recording');
            micBtn.innerText = "🎤";
            document.getElementById('input-text').placeholder = "Nhập văn bản hoặc bấm Micro để nói tiếng Anh...";
            isRecording = false;
        }


        // 2. HÀM DỊCH VĂN BẢN (GOOGLE APPS SCRIPT)
        async function translateText() {
            const inputText = document.getElementById('input-text').value.trim();
            const outputText = document.getElementById('output-text');

            if (!inputText) {
                outputText.value = "Vui lòng nhập đoạn văn cần dịch.";
                return;
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            outputText.value = "Đang dịch...";

            try {
                const finalUrl = `${GOOGLE_SCRIPT_URL}?q=${encodeURIComponent(inputText)}&lang=en-vi`;
                const response = await fetch(finalUrl);
                const data = await response.json();

                if (data.status === "success") {
                    outputText.value = data.translated_text;
                    
                    const isAutoSpeak = document.getElementById('auto-speak-cb').checked;
                    if (isAutoSpeak) {
                        speak(data.translated_text);
                    }
                } else {
                    outputText.value = "Lỗi từ API: " + data.message;
                }
            } catch (error) {
                console.error("Lỗi:", error);
                outputText.value = "Không thể kết nối với máy chủ dịch thuật.";
            }
        }

        // 3. HÀM PHÁT ÂM TIẾNG VIỆT (ĐÃ SỬA LỖI GIỌNG ĐỌC TRÊN GITHUB)
        function speak(text) {
            if ('speechSynthesis' in window && text) {
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0; 
                utterance.pitch = 1.0;

                const voices = window.speechSynthesis.getVoices();
                const viVoice = voices.find(voice => voice.lang.includes('vi'));

                if (viVoice) {
                    utterance.voice = viVoice;
                    utterance.lang = viVoice.lang;
                } else {
                    utterance.lang = 'vi-VN';
                }

                window.speechSynthesis.speak(utterance);
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
    </script>

</body>
</html>
