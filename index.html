<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Dịch Tiếng Anh Sang Tiếng Việt</title>
    <style>
        /* --- Reset & Thiết lập chung --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* --- Container chính --- */
        .translator-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 800px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }

        /* --- Bố cục các hộp văn bản --- */
        .boxes-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .box-header {
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .language-badge {
            background-color: #3498db;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: #3498db;
        }

        #output-text {
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        /* --- Tùy chọn Tự động phát âm (Auto Speak Toggle) --- */
        .auto-speak-container {
            margin-left: auto; /* Đẩy sang bên phải góc hộp */
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-weight: normal;
            color: #7f8c8d;
            cursor: pointer;
            user-select: none;
        }

        .auto-speak-container input {
            cursor: pointer;
        }

        /* --- Nút bấm điều khiển --- */
        .button-zone {
            display: flex;
            justify-content: center;
        }

        .btn-translate {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }

        .btn-translate:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* --- Responsive cho điện thoại --- */
        @media (max-width: 600px) {
            .boxes-wrapper {
                flex-direction: column;
            }
            textarea {
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="translator-container">
        <h1>Ứng Dụng Dịch Thuật & Phát Âm</h1>
        
        <div class="boxes-wrapper">
            <!-- Hộp nhập tiếng Anh -->
            <div class="box">
                <div class="box-header">
                    Tiếng Anh <span class="language-badge">EN</span>
                </div>
                <textarea id="input-text" placeholder="Nhập hoặc dán đoạn văn tiếng Anh vào đây..."></textarea>
            </div>
            
            <!-- Hộp hiển thị tiếng Việt -->
            <div class="box">
                <div class="box-header">
                    Tiếng Việt <span class="language-badge" style="background-color: #e74c3c;">VI</span>
                    
                    <!-- Khu vực nút chọn tự động đọc -->
                    <label class="auto-speak-container">
                        <input type="checkbox" id="auto-speak-cb" checked>
                        <span>Dịch xong đọc luôn 🔊</span>
                    </label>
                </div>
                <textarea id="output-text" placeholder="Bản dịch sẽ xuất hiện ở đây..." readonly></textarea>
            </div>
        </div>

        <!-- Nút kích hoạt dịch -->
        <div class="button-zone">
            <button class="btn-translate" onclick="translateText()">Dịch Ngay</button>
        </div>
    </div>

    <script>
// Cấu hình URL Google Apps Script của bạn tại đây
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKO9ySTedNJqJ-uv9MFNtGFC8DPtf3jPP4pV0pL0zIAng661rZ70_YcgUeAmOpdiEI/exec";

        async function translateText() {
            const inputText = document.getElementById('input-text').value.trim();
            const outputText = document.getElementById('output-text');

            if (!inputText) {
                outputText.value = "Vui lòng nhập đoạn văn cần dịch.";
                return;
            }

            // Dừng ngay lập tức bất kỳ giọng đọc nào đang chạy dở trước đó
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            outputText.value = "Đang dịch...";

            try {
                const finalUrl = `${GOOGLE_SCRIPT_URL}?q=${encodeURIComponent(inputText)}&lang=en-vi`;
                const response = await fetch(finalUrl);
                const data = await response.json();

                if (data.status === "success") {
                    outputText.value = data.translated_text;
                    
                    // Kiểm tra xem người dùng có chọn "Dịch xong đọc luôn" không
                    const isAutoSpeak = document.getElementById('auto-speak-cb').checked;
                    if (isAutoSpeak) {
                        speak(data.translated_text);
                    }
                } else {
                    outputText.value = "Lỗi từ API: " + data.message;
                }
            } catch (error) {
                console.error("Lỗi:", error);
                outputText.value = "Không thể kết nối với máy chủ dịch thuật.";
            }
        }

        // Hàm lõi phụ trách phát âm văn bản tiếng Việt
        function speak(text) {
            if ('speechSynthesis' in window && text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 1.0; 
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>

</body>
</html>
